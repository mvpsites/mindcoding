name: Art Courier

on:
  push:
    paths: ["tools/art-manifest.json"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pillow
      - run: python tools/fetch_art.py
      - name: Commit art
        run: |
          git config user.name "art-courier"
          git config user.email "bot@mvpsites.com"
          git add public/art
          git diff --cached --quiet || git commit -m "Art courier: card artwork fetched and optimized"
          git push
