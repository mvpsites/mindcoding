name: Device Truth

# ============================================================
# DEVICE TRUTH — ruled 2026-07-15 after Jad's mobile bug run.
# Code checks are not device checks: this renders every page in
# a REAL headless browser (iPhone 390x844 touch + desktop
# 1440x900), in BOTH motion modes (prefers-reduced-motion
# reduce / no-preference), fails on console errors, horizontal
# overflow, and undersized tap targets, screenshots everything
# (artifact: device-truth-shots), and runs the repo's optional
# device-truth.spec.mjs for project-specific interactions
# (the gate drag, the emblem touch). Findings surface as
# ::notice/::error annotations — the channel readable from
# chat sessions.
#
# REUSABLE ACROSS PROJECTS (self-contained — no cross-repo
# fetch). Any repo adopts it with a caller workflow:
#
#   name: Device Truth
#   on: { push: { branches: [main] } }
#   jobs:
#     dt:
#       uses: mvpsites/mindcoding/.github/workflows/device-truth.yml@main
#       with:
#         build: "npm ci && npm run build"
#         dist: "dist"
#         pages: '["/", "about/"]'
#
# (Org setting required once: Actions → allow private repos to
# use reusable workflows from other private repos.)
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      build:
        description: Build command producing the static site
        type: string
        default: ""
      dist:
        description: Directory to serve
        type: string
        default: dist
      pages:
        description: JSON array of paths to check
        type: string
        default: '["/"]'

jobs:
  device-truth:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Build site
        run: |
          set -e
          BUILD='${{ inputs.build }}'
          if [ -z "$BUILD" ]; then
            # in-repo default (mindcoding): copy build + SEO generator
            npm run build
            node tools/build_rolls.mjs '${{ inputs.dist || 'dist' }}' || true
          else
            eval "$BUILD"
          fi

      - name: Install headless browser
        run: |
          npm i --no-save playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          echo "playwright ready"

      - name: Serve site
        run: |
          (cd '${{ inputs.dist || 'dist' }}' && python3 -m http.server 8909 >/dev/null 2>&1 &)
          sleep 1

      - name: Run device truth
        run: |
          mkdir -p dt-shots
          cat > dt-runner.mjs << 'RUNNER'
          import { chromium } from 'playwright';
          import { existsSync } from 'node:fs';

          const BASE = 'http://127.0.0.1:8909';
          const PAGES = JSON.parse(process.env.DT_PAGES || '["/"]');
          const errors = [];
          const report = (level, msg) => {
            console.log(`::${level === 'error' ? 'error' : 'notice'}::${msg}`);
            if (level === 'error') errors.push(msg);
          };
          const shot = async (page, name) =>
            page.screenshot({ path: `dt-shots/${name}.png`, fullPage: false }).catch(() => {});

          const VIEWPORTS = [
            { name: 'iphone', viewport: { width: 390, height: 844 }, deviceScaleFactor: 3, isMobile: true, hasTouch: true },
            { name: 'desktop', viewport: { width: 1440, height: 900 }, deviceScaleFactor: 1 },
          ];
          const MODES = ['reduce', 'no-preference'];

          const browser = await chromium.launch();
          for (const vp of VIEWPORTS) {
            for (const rm of MODES) {
              const ctx = await browser.newContext({ ...vp, reducedMotion: rm });
              const consoleErrs = [];
              let currentPath = '(spec)';
              const newPage = async () => {
                const p = await ctx.newPage();
                p.on('pageerror', e => consoleErrs.push(`${currentPath} — ${String(e).slice(0, 160)}`));
                p.on('console', m => { if (m.type() === 'error') consoleErrs.push(`${currentPath} — ${m.text().slice(0, 160)}`); });
                return p;
              };

              /* ---- generic per-page checks ---- */
              for (const path of PAGES) {
                currentPath = path;
                const page = await newPage();
                try {
                  await page.goto(BASE + path, { waitUntil: 'load', timeout: 20000 });
                  await page.waitForTimeout(700);
                  const over = await page.evaluate(() =>
                    document.documentElement.scrollWidth - window.innerWidth);
                  if (over > 2)
                    report('error', `[${vp.name}/${rm}] ${path} horizontal overflow: +${over}px`);
                  if (vp.name === 'iphone') {
                    const tiny = await page.evaluate(() =>
                      [...document.querySelectorAll('button')].flatMap(b => {
                        const r = b.getBoundingClientRect();
                        if (!(r.width > 0 && r.height > 0 && (r.width < 32 || r.height < 32))) return [];
                        const id = b.id ? '#' + b.id : (b.className ? '.' + String(b.className).trim().split(/\s+/).join('.') : '');
                        return [`<button${id}> "${(b.textContent||'').trim().slice(0,30)}" ${Math.round(r.width)}x${Math.round(r.height)}px`];
                      }));
                    for (const t of tiny)
                      report('error', `[${vp.name}/${rm}] ${path}: tap target under 32px — ${t}`);
                  }
                  await shot(page, `page${path.replace(/[\\/]+/g, '_') || '_root'}-${vp.name}-${rm}`);
                } catch (e) {
                  report('error', `[${vp.name}/${rm}] ${path} failed to load: ${String(e).slice(0, 120)}`);
                }
                await page.close();
              }

              /* ---- project spec (optional) ---- */
              if (existsSync('device-truth.spec.mjs')) {
                try {
                  const spec = (await import(process.cwd() + '/device-truth.spec.mjs')).default;
                  await spec({ newPage, base: BASE, viewport: vp.name, rm, report, shot });
                } catch (e) {
                  report('error', `[${vp.name}/${rm}] spec crashed: ${String(e).slice(0, 160)}`);
                }
              }

              for (const c of [...new Set(consoleErrs)])
                report('error', `[${vp.name}/${rm}] console: ${c}`);
              await ctx.close();
            }
          }
          await browser.close();
          console.log(`::notice::device truth complete — ${errors.length} error(s)`);
          const { writeFileSync } = await import('node:fs');
          writeFileSync('dt-findings.txt', errors.join('\n'));
          process.exit(errors.length ? 1 : 0);
          RUNNER
          DT_PAGES='${{ inputs.pages }}' node dt-runner.mjs
        env:
          DT_PAGES: ${{ inputs.pages || '["/", "/draw/", "/channels/", "/channels/books/"]' }}

      - name: Post findings as commit comment
        if: failure()
        run: |
          [ -s dt-findings.txt ] || exit 0
          python3 - << 'PY'
          import json, os, urllib.request
          body = "## DEVICE TRUTH — findings\n```\n" + open("dt-findings.txt").read()[:60000] + "\n```\n(screenshots: run artifact `device-truth-shots`)"
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GH_REPO']}/commits/{os.environ['GH_SHA']}/comments",
              data=json.dumps({"body": body}).encode(),
              headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"],
                       "Accept": "application/vnd.github+json"})
          print("comment:", urllib.request.urlopen(req).status)
          PY
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: device-truth-shots
          path: dt-shots/
          retention-days: 14
