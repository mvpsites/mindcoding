<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>MIND CODING — The Draw · Gate 2</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--paper:#070B1A;--ink:#EFE7D6;--ink-dim:#B8B0A3;--ink-faint:#6d6a5e;--gold:#D79A4A;--bd:8px;
--mono:"Space Mono",monospace;--disp:"Archivo Black",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:system-ui,sans-serif;cursor:crosshair;
min-height:100vh;display:grid;place-items:center;padding:1.2rem}
.plate{border:var(--bd) solid var(--ink);max-width:34rem;width:100%}
.bar{border-bottom:2px solid var(--ink);padding:.7rem 1.1rem;font-family:var(--mono);
font-size:.62rem;letter-spacing:.2em;color:var(--ink-dim)}
.bar b{color:var(--gold);font-weight:700}
.body{padding:2rem 1.1rem 2.4rem}
h1{font-family:var(--disp);text-transform:uppercase;line-height:.95;
font-size:clamp(2rem,8vw,3.4rem);margin-bottom:1.1rem}
h1 span{color:var(--gold)}
p{color:var(--ink-dim);max-width:28rem;margin-bottom:1rem}
.stamp{display:inline-block;transform:rotate(-3deg);border:var(--bd) solid var(--gold);
color:var(--gold);font-family:var(--disp);text-transform:uppercase;padding:.6rem .9rem;
font-size:.95rem;margin:.6rem 0 1.2rem}
a{display:inline-block;font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;
color:var(--ink);text-transform:uppercase;border-bottom:2px solid var(--gold);
padding-bottom:2px;text-decoration:none}
a:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="plate">
  <div class="bar">MIND CODING · <b>THE DRAW</b> · GATE 2</div>
  <div class="body">
    <h1>THIS PAGE IS<br /><span>INTENTIONALLY UNSET.</span></h1>
    <div class="stamp">AWAITING GATE 1</div>
    <p>Seventy-eight plates are inked and waiting. The draw is typeset after the
    cover is approved — one gate at a time, the way the manual says.</p>
    <a href="../">← BACK TO THE COVER</a>
  </div>
</div>
</body>
</html>
